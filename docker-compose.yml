services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:?set in the host environment}
      DATABASE_URL: ${DATABASE_URL:-}
      REQUIRE_DURABLE_STORAGE: ${REQUIRE_DURABLE_STORAGE:-false}
      SYNC_COMMANDS_ON_START: ${SYNC_COMMANDS_ON_START:-false}
      PORT: "10000"
    ports:
      - "10000:10000"
